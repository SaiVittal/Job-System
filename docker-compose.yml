services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: npm run start:dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    # Use a custom entrypoint/command to run the worker main.ts
    command: npx ts-node src/worker/main.ts
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CONCURRENCY: 5
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
